<style>
  {{ if .IsHome }}
    {{- with resources.Get "sass/default.scss" -}}
      {{- $default_style := . | css.Sass -}}
      {{- $default_style.Content | safeCSS -}}
    {{- end -}}
  {{ else }}
    {{- with resources.Get "sass/activity.scss" -}}
      {{- $activity_style := . | css.Sass | minify -}}
      {{- $activity_style.Content | safeCSS -}}
    {{- end -}}
  {{ end }}

  {{ $terminal_style := "" }}
  {{ $scheme := .Site.Params.Terminal.scheme | default "default" }}
  
  {{/* Strips "shell-" prefix if present, leaving just "ubuntu", "monokai", etc. */}}
  {{ $style_name := replace $scheme "shell-" "" }}
  {{ $sass_path := printf "sass/%s.scss" $style_name }}

  {{- with resources.Get $sass_path -}}
    {{- $terminal_style = (. | css.Sass | minify).Content -}}
  {{- end -}}

  {{/* The getJSON call was removed for Hugo v0.162 compatibility */}}
  
  {{ $terminal_style | safeCSS }}
</style>
